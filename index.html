<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Meghan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(120, 119, 255, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(103, 58, 183, 0.35), transparent 35%),
        linear-gradient(135deg, #0f1020, #1b1f4b, #4b2e83, #6a4cff);
      overflow: hidden;
      padding: 12px;
    }

    /* Phone frame */
    .phone-screen {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 100vh;
      max-height: 844px;
      overflow: hidden;
      border-radius: 28px;
      background:
        radial-gradient(circle at top left, rgba(120, 119, 255, 0.20), transparent 35%),
        radial-gradient(circle at bottom right, rgba(103, 58, 183, 0.20), transparent 35%),
        linear-gradient(180deg, #12152f, #1f2561, #4a2f89, #6a4cff);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .glow {
      position: absolute;
      width: 260px;
      height: 260px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(130, 110, 255, 0.25), transparent 70%);
      border-radius: 50%;
      filter: blur(35px);
      animation: pulseGlow 4s ease-in-out infinite;
      pointer-events: none;
    }

    .center-box {
      position: absolute;
      z-index: 10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      width: calc(100% - 32px);
      max-width: 320px;
      padding: 22px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .center-box h1 {
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      margin-bottom: 8px;
      line-height: 1.2;
      background: linear-gradient(90deg, #9fd3ff, #c7a6ff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulseText 2.2s ease-in-out infinite;
    }

    .center-box p {
      font-size: clamp(0.95rem, 3.5vw, 1.05rem);
      color: #e7dcff;
      letter-spacing: 0.5px;
    }

    .floating-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .floating-text {
      position: absolute;
      color: #ffffff;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      text-shadow:
        0 0 8px rgba(155, 180, 255, 0.9),
        0 0 18px rgba(157, 78, 221, 0.6);
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(30px) scale(0.85);
        opacity: 0;
      }
      10% {
        opacity: 0.95;
      }
      100% {
        transform: translateY(-110vh) scale(1.05);
        opacity: 0;
      }
    }

    @keyframes pulseText {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.15);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
      }

      .phone-screen {
        max-width: 100%;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }

      .center-box {
        width: calc(100% - 24px);
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="phone-screen">
    <div class="glow"></div>

    <div class="floating-layer" id="floatingLayer"></div>

    <div class="center-box">
      <h1>For Meghan 💜💙</h1>
      <p>You’re so very beautiful</p>
    </div>
  </div>

  <script>
    const total = 500;
    const message = "You're so very beautiful Meghan 💜💙";
    const floatingLayer = document.getElementById("floatingLayer");
    const phoneScreen = document.querySelector(".phone-screen");

    function createFloatingText() {
      const text = document.createElement("div");
      text.className = "floating-text";
      text.innerText = message;

      const screenWidth = phoneScreen.clientWidth;
      const screenHeight = phoneScreen.clientHeight;

      const fontSize = Math.random() * 8 + 10; // 10 to 18
      const estimatedWidth = message.length * (fontSize * 0.55);
      const maxLeft = Math.max(0, screenWidth - estimatedWidth - 10);

      text.style.fontSize = fontSize + "px";
      text.style.left = Math.random() * maxLeft + "px";
      text.style.top = screenHeight + Math.random() * 200 + "px";
      text.style.animationDuration = (6 + Math.random() * 4) + "s";
      text.style.animationDelay = (Math.random() * 5) + "s";

      floatingLayer.appendChild(text);
    }

    for (let i = 0; i < total; i++) {
      createFloatingText();
    }
  </script>
</body>
</html>
